# ===== Server =====
server.port=8081

# ===== MySQL Database =====
# The database is created automatically on first run (createDatabaseIfNotExist=true)
spring.datasource.url=jdbc:mysql://mysql-campussync.alwaysdata.net:3306/campussync_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=campussync
spring.datasource.password=campus@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
# update = create tables from entities, keep data between restarts
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.sql.init.mode=always

# ===== JWT =====
