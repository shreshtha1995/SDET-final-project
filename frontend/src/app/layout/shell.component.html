<header class="navbar" id="app-navbar">
      <a id="nav-brand-link" class="brand" [routerLink]="auth.isAdmin() ? '/admin' : '/dashboard'">CampusSync</a>
      <nav>
        @if (auth.isAdmin()) {
          <a id="nav-admin-link" routerLink="/admin" routerLinkActive="active">Admin Panel</a>
        } @else {
          <a id="nav-dashboard-link" routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
          <a id="nav-browse-link" routerLink="/browse" routerLinkActive="active">Browse Rooms</a>
          <a id="nav-create-listing-link" routerLink="/create-listing" routerLinkActive="active">List a Room</a>
          <a id="nav-my-listings-link" routerLink="/my-listings" routerLinkActive="active">My Listings</a>
          <a id="nav-wishlist-link" routerLink="/wishlist" routerLinkActive="active">Wishlist</a>
          <a id="nav-forum-link" routerLink="/forum" routerLinkActive="active">Forum</a>
        }
      </nav>
      <div class="nav-right">
        <button id="nav-theme-toggle-btn" class="icon-btn" (click)="theme.toggle()" [title]="theme.theme() === 'dark' ? 'Light mode' : 'Dark mode'">
          <app-icon [name]="theme.theme() === 'dark' ? 'sun' : 'moon'" [size]="19" />
        </button>
        <div class="menu-wrap">
          <span id="nav-avatar" class="avatar" (click)="menuOpen.set(!menuOpen())">{{ initials() }}</span>
          @if (menuOpen()) {
            <div id="nav-user-menu" class="menu">
              <div class="menu-head">
                <div class="nm">{{ auth.user()?.name }}</div>
                <div class="muted">{{ auth.user()?.email }}</div>
              </div>
              @if (!auth.isAdmin()) {
                <button id="nav-profile-btn" (click)="goProfile()"><app-icon name="user" [size]="16" /> My Profile</button>
              }
              <button id="nav-logout-btn" (click)="logout()"><app-icon name="logout" [size]="16" /> Logout</button>
            </div>
          }
        </div>
      </div>
    </header>

    @if (menuOpen()) { <div class="backdrop" (click)="menuOpen.set(false)"></div> }

    <main class="container" id="app-main">
      <router-outlet />
    </main>
